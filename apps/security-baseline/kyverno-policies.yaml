apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-image-tag
spec:
  admission: true
  validationFailureAction: Enforce
  background: true
  emitWarning: false
  rules:
    - name: containers
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        allowExistingViolations: true
        message: Images must not use the mutable latest tag.
        foreach:
          - list: request.object.spec.containers
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, ':latest') }}"
                    operator: Equals
                    value: true
          - list: request.object.spec.initContainers || `[]`
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, ':latest') }}"
                    operator: Equals
                    value: true
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-loadbalancer-services
spec:
  admission: true
  validationFailureAction: Enforce
  background: true
  emitWarning: false
  rules:
    - name: require-explicit-loadbalancer-approval
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Service
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      preconditions:
        all:
          - key: "{{ request.object.spec.type || '' }}"
            operator: Equals
            value: LoadBalancer
          - key: "{{ request.object.spec.loadBalancerClass || '' }}"
            operator: NotEquals
            value: tailscale
          - key: "{{ request.object.metadata.labels.\"homelab.slowking.dev/allow-public-load-balancer\" || 'false' }}"
            operator: NotEquals
            value: "true"
      validate:
        allowExistingViolations: true
        message: Public LoadBalancer Services require the homelab.slowking.dev/allow-public-load-balancer=true label; Tailscale LoadBalancers are allowed.
        deny: {}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-minio-post-job-security-context
spec:
  admission: true
  background: false
  emitWarning: false
  rules:
    - name: restrict-minio-post-job-containers
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - minio
              selector:
                matchLabels:
                  app: minio-job
      mutate:
        foreach:
          - list: request.object.spec.containers
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
          - list: request.object.spec.initContainers || `[]`
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-image-digest-pinning
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
    - name: critical-workloads-should-pin-digests
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - argocd
                - vault
                - minio
                - registry
      validate:
        allowExistingViolations: true
        message: Critical workloads should pin images by digest.
        foreach:
          - list: request.object.spec.containers
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
          - list: request.object.spec.initContainers || `[]`
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-container-resources
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
    - name: require-requests-and-memory-limits
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        allowExistingViolations: true
        message: Containers should set cpu and memory requests and a memory limit.
        foreach:
          - list: request.object.spec.containers
            deny:
              conditions:
                any:
                  - key: "{{ element.resources.requests.cpu || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.resources.requests.memory || '' }}"
                    operator: Equals
                    value: ""
                  - key: "{{ element.resources.limits.memory || '' }}"
                    operator: Equals
                    value: ""
