policies:
  - name: loki
    statements:
      - resources: ["arn:aws:s3:::loki"]
        actions:
          - "s3:GetBucketLocation"
          - "s3:ListBucket"
          - "s3:ListBucketMultipartUploads"
      - resources: ["arn:aws:s3:::loki/*"]
        actions:
          - "s3:AbortMultipartUpload"
          - "s3:DeleteObject"
          - "s3:GetObject"
          - "s3:ListMultipartUploadParts"
          - "s3:PutObject"
  - name: zot
    statements:
      - resources: ["arn:aws:s3:::zot"]
        actions:
          - "s3:GetBucketLocation"
          - "s3:ListBucket"
          - "s3:ListBucketMultipartUploads"
      - resources: ["arn:aws:s3:::zot/*"]
        actions:
          - "s3:AbortMultipartUpload"
          - "s3:DeleteObject"
          - "s3:GetObject"
          - "s3:ListMultipartUploadParts"
          - "s3:PutObject"
  - name: postgres
    statements:
      - resources: ["arn:aws:s3:::postgres-backups"]
        actions:
          - "s3:GetBucketLocation"
          - "s3:ListBucket"
          - "s3:ListBucketMultipartUploads"
      - resources: ["arn:aws:s3:::postgres-backups/*"]
        actions:
          - "s3:AbortMultipartUpload"
          - "s3:DeleteObject"
          - "s3:GetObject"
          - "s3:ListMultipartUploadParts"
          - "s3:PutObject"
