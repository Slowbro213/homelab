mode: standalone
replicas: 1
existingSecret: minio-root-credentials
extraSecret: minio-root-credentials
environment:
  MINIO_SSE_AUTO_ENCRYPTION: "on"
persistence:
  enabled: true
  storageClass: longhorn-rwo
  size: 50Gi
securityContext:
  enabled: true
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault
postJob:
  securityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi
service:
  type: ClusterIP
  port: 9000
consoleService:
  type: ClusterIP
  port: 9001
