apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: grafana-secrets
  namespace: monitoring
spec:
  type: kv-v2
  mount: secret
  path: grafana/admin
  refreshAfter: 1h
  vaultAuthRef: vault
  destination:
    create: true
    name: grafana-secrets
    overwrite: true
---
