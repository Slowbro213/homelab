architecture: standalone

image:
  registry: docker.io
  repository: bitnami/redis
  tag: 8.2.1-debian-12

auth:
  enabled: true
  existingSecret: redis-auth
  existingSecretPasswordKey: password

master:
  persistence:
    enabled: true
    storageClass: longhorn-rwo
    size: 2Gi
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi

replica:
  replicaCount: 0

metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis-exporter
    tag: 1.76.0-debian-12
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    labels:
      release: monitoring
