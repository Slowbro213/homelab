apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-tailscale
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/Slowbro213/homelab.git
    targetRevision: main
    path: apps/tailscale/longhorn
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
