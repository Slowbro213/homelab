apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: infra

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.8.0
    helm:
      releaseName: kyverno
      values: |
        config:
          preserve: false

        webhookLabels:
          app.kubernetes.io/managed-by: argocd

        admissionController:
          replicas: 1

        backgroundController:
          replicas: 1

        cleanupController:
          replicas: 1

        reportsController:
          enabled: false

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
