apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0
    helm:
      releaseName: loki
      valuesObject:
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false

          podSecurityContext:
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault

          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault

          commonConfig:
            replication_factor: 1

          storage:
            type: s3
            bucketNames:
              chunks: loki
              ruler: loki
              admin: loki
            s3:
              endpoint: minio.minio.svc.cluster.local:9000
              region: us-east-1
              accessKeyId: ${MINIO_LOKI_ACCESS_KEY}
              secretAccessKey: ${MINIO_LOKI_SECRET_KEY}
              s3ForcePathStyle: true
              insecure: true

          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          limits_config:
            retention_period: 168h

        singleBinary:
          replicas: 1

          extraArgs:
            - -config.expand-env=true

          extraEnvFrom:
            - secretRef:
                name: loki-s3-credentials

          persistence:
            enabled: true
            storageClass: longhorn-rwo
            size: 10Gi

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        gateway:
          enabled: true
          podSecurityContext:
            fsGroup: 101
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 101
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault

        lokiCanary:
          enabled: true

        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomCompactor:
          replicas: 0
        bloomGateway:
          replicas: 0

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
