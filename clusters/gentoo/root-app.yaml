apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gentoo-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Slowbro213/homelab.git
    targetRevision: main
    path: clusters/gentoo/apps
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
